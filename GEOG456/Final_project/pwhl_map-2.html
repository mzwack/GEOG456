<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Professional Women's Hockey League (PWHL) Teams – 2025–26 Season</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e8eaf0; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    padding: 14px 28px;
    display: flex; align-items: center; z-index: 1000;
  }
  header h1 {
    font-size: 1.45rem; font-weight: 700; color: #f0f6fc;
    letter-spacing: 0.2px; line-height: 1.2;
  }
  header .season-sub {
    font-size: 0.82rem; font-weight: 400; color: #8b949e;
    margin-top: 2px; letter-spacing: 0.3px;
  }

  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Legend */
  .legend {
    background: rgba(10,14,26,0.93); border: 1px solid #3a3560;
    border-radius: 10px; padding: 10px 14px; min-width: 170px;
  }
  .legend h4 { font-size: 0.7rem; font-weight: 600; color: #c8b8ff; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 0.7rem; color: #ccc; }
  .legend-swatch { width: 20px; height: 13px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }

  /* Popup */
  .team-popup { width: 430px; max-height: 70vh; overflow-y: auto; background: #0d1225; border-radius: 12px; font-family: 'Inter', sans-serif; scrollbar-width: thin; scrollbar-color: #4a2d8a transparent; }
  .team-popup::-webkit-scrollbar { width: 5px; }
  .team-popup::-webkit-scrollbar-thumb { background: #4a2d8a; border-radius: 3px; }

  .popup-header {
    background: linear-gradient(135deg, #1a0a2e, #0d1b3e);
    padding: 14px 16px 12px; border-radius: 12px 12px 0 0;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 2px solid #3a1d6e;
  }
  .popup-header img { width: 54px; height: 54px; object-fit: contain; background: white; border-radius: 50%; padding: 4px; }
  .popup-header .team-name { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .popup-header .team-meta { font-size: 0.73rem; color: #a09dc0; margin-top: 3px; }

  .popup-body { padding: 12px 16px; }

  .record-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat-pill { background: #1e2445; border-radius: 8px; padding: 6px 10px; text-align: center; flex: 1; border: 1px solid #3a3a6a; }
  .stat-pill .num { font-size: 1.3rem; font-weight: 700; color: #8b7cf6; }
  .stat-pill .lbl { font-size: 0.62rem; color: #888; text-transform: uppercase; letter-spacing: 0.8px; }

  .section-title {
    font-size: 0.68rem; font-weight: 600; color: #8b7cf6; text-transform: uppercase;
    letter-spacing: 1px; margin: 10px 0 5px; border-bottom: 1px solid #252848; padding-bottom: 3px;
  }
  .coaches-list { font-size: 0.78rem; color: #c8c8e8; line-height: 1.8; }
  .coaches-list strong { color: #e8e8ff; }

  .player-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
  .player-table th {
    background: #1a1d3a; color: #8b7cf6; padding: 5px 5px; text-align: left;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .player-table td { padding: 4px 5px; border-bottom: 1px solid #1e2240; color: #d0d2e8; vertical-align: top; }
  .player-table tr:hover td { background: #161930; }
  .g-badge { display:inline-block; background:#1e2445; color:#8b7cf6; border-radius:3px; padding:1px 4px; font-size:0.6rem; font-weight:700; }

  .intl-box { background:#12183a; border:1px solid #3a3560; border-radius:7px; padding:9px 11px; margin-top:7px; }
  .intl-title { font-size:0.68rem; font-weight:600; color:#f0a060; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }

  /* Marker */
  .pwhl-marker { background:white; border-radius:50%; border:3px solid #4a2d8a; box-shadow:0 3px 12px rgba(74,45,138,0.6); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.15s, box-shadow 0.15s; }
  .pwhl-marker:hover { transform:scale(1.15); box-shadow:0 5px 18px rgba(139,124,246,0.9); }
  .pwhl-marker img { width:100%; height:100%; border-radius:50%; object-fit:contain; padding:3px; }

  /* Loading */
  .loading-overlay { position:absolute; inset:0; background:rgba(10,14,26,0.88); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:12px; }
  .spinner { width:38px; height:38px; border:4px solid #3a1d6e; border-top-color:#8b7cf6; border-radius:50%; animation:spin 0.85s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-overlay p { color:#a09dc0; font-size:0.88rem; }

  /* Leaflet popup overrides */
  .leaflet-popup-content-wrapper { background:transparent!important; box-shadow:0 8px 32px rgba(0,0,0,0.75)!important; border-radius:12px!important; padding:0!important; }
  .leaflet-popup-content { margin:0!important; }
  .leaflet-popup-tip { background:#0d1117!important; }
  .leaflet-popup-close-button { color:#aaa!important; top:7px!important; right:9px!important; font-size:17px!important; z-index:10; }
</style>
</head>

  NYR: {"Elle Hartje":4,"Savannah Norcross":7,"Sarah Fillier":10,"Taylor Girard":17,"Maddi Wheeler":18,"Paetyn Levis":19,"Anna Bargman":22,"Anne Cherkowski":24,"Casey O'Brien":26,"Emmy Fecteau":29,"Clair DeGeorge":41,"Kristin O'Neill":43,"Denisa Krizova":44,"Denisa Křǐžová":44,"Kira Juodikis":55,"Sarah Bujold":62,"Kayla Vespa":81,"Kristyna Kaltounková":98,"Kristýna Kaltounková":98,"Dayle Ross":2,"Maja Nylen Persson":8,"Maja Nylén Persson":8,"Olivia Knowles":9,"Nicole Vallario":11,"Jaime Bourbonnais":14,"Lauren Bernard":16,"Allyson Simpson":20,"Micah Zandee-Hart":28,"Callie Shanahan":37,"Kaley Doyle":39,"Kayle Osborne":82},

  TOR: {"Daryl Watts":9,"Kiara Zanon":11,"Anneke Rankila":13,"Lauren Messier":16,"Jesse Compher":18,"Sara Hjalmarsson":19,"Emma Gentry":20,"Kristin Della Rovere":21,"Maggie Connors":22,"Natalie Spooner":24,"Clara Van Wieren":25,"Emma Maltais":27,"Blayre Turnbull":40,"Claire Dalton":42,"Emma Woods":67,"Jessica Kondas":2,"Kali Flanagan":6,"Hannah Baskin":10,"Allie Munroe":12,"Renata Fast":14,"Savannah Harmon":15,"Ella Shelton":17,"Anna Kjellbin":71,"Raygan Kirk":1,"Elaine Chuli":29,"Jessie McPherson":91},

  VAN: {"Izzy Daniel":8,"Kaitlin Chan":9,"Jenn Gardiner":12,"Tereza Vanisova":13,"Tereza Vanišová":13,"Gabby Rosenthal":15,"Malia Schneider":18,"Mannon McMahon":19,"Sarah Nurse":20,"Abby Boreen":22,"Michelle Karvinen":33,"Hannah Miller":34,"Anna Segedi":51,"Darcie Lappan":72,"Anna Meixner":94,"Anna Shokhina":97,"Madison Samoskevich":7,"Maddy Samoskevich":7,"Sydney Bard":11,"Sophie Jaques":16,"Ashton Bell":21,"Mellissa Channell":23,"Mellissa Channell-Watkins":23,"Nina Jobst-Smith":28,"Claire Thompson":42,"Kimberly Newell":35,"Emerance Maschmeyer":38,"Kristen Campbell":50,"Michela Cava":86,"Brooke McQuigge":27,"Emma Greco":25}
};

// US state name → abbreviation
const US_NAME_ABBR = {
  "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
  "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
  "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA",
  "Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
  "Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS",
  "Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH",
  "New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC",
  "North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA",
  "Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN",
  "Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA",
  "West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY","District of Columbia":"DC"
};

// Canada province name → abbreviation
const CA_NAME_ABBR = {
  "Alberta":"AB","British Columbia":"BC","Manitoba":"MB","New Brunswick":"NB",
  "Newfoundland and Labrador":"NL","Newfoundland":"NL","Nova Scotia":"NS",
  "Ontario":"ON","Prince Edward Island":"PE","Quebec":"QC","Saskatchewan":"SK",
  "Northwest Territories":"NT","Nunavut":"NU","Yukon":"YT"
};

// ── MAP INIT ──────────────────────────────────────────────────
const map = L.map('map', { center:[49,-95], zoom:4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© CARTO | PWHL Data via fastRhockey',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

// ── COLOUR SCALE — fixed stepped breaks ───────────────────────
// 7 visually distinct classes, not tied to globalMax
const COLOR_BREAKS = [
  { min: 0,  max: 0,  color: '#3d4455', label: '0 — No players' },
  { min: 1,  max: 1,  color: '#c6dff0', label: '1 player' },
  { min: 2,  max: 3,  color: '#7db8e0', label: '2–3 players' },
  { min: 4,  max: 5,  color: '#3a8bbf', label: '4–5 players' },
  { min: 6,  max: 9,  color: '#1a5f8a', label: '6–9 players' },
  { min: 10, max: 14, color: '#0d3a5c', label: '10–14 players' },
  { min: 15, max: Infinity, color: '#051c30', label: '15+ players' }
];

function regionColor(count) {
  if (!count || count === 0) return '#000000';
  for (let i = COLOR_BREAKS.length - 1; i >= 0; i--) {
    if (count >= COLOR_BREAKS[i].min) return COLOR_BREAKS[i].color;
  }
  return '#000000';
}

let pwhlData = null;
let globalMax = 5;

// ── CHOROPLETH ────────────────────────────────────────────────
function makeChoropleth(geojsonData, type) {
  // type = "us" or "ca"
  const counts  = type === "us" ? pwhlData.origins.us_states : pwhlData.origins.ca_provinces;
  const nameMap = type === "us" ? US_NAME_ABBR : CA_NAME_ABBR;

  return L.geoJSON(geojsonData, {
    style: feat => {
      const rawName = feat.properties.name || feat.properties.NAME ||
                      feat.properties.province || feat.properties.PRENAME || "";
      const abbr  = nameMap[rawName] || rawName.toUpperCase().slice(0,2);
      const count = (counts && counts[abbr]) ? counts[abbr] : 0;
      return {
        fillColor:   regionColor(count),
        fillOpacity: count > 0 ? 0.82 : 0.04,
        color:       '#444',
        weight:      0.7
      };
    },
    onEachFeature: (feat, layer) => {
      const rawName = feat.properties.name || feat.properties.NAME ||
                      feat.properties.province || feat.properties.PRENAME || "";
      const abbr  = nameMap[rawName] || rawName.toUpperCase().slice(0,2);
      const count = (counts && counts[abbr]) ? counts[abbr] : 0;
      layer.bindTooltip(
        `<b>${rawName}</b><br/>${count > 0 ? count + " PWHL player" + (count>1?"s":"") : "No PWHL players"}`,
        { sticky: true }
      );
    }
  });
}

// ── TEAM MARKERS ─────────────────────────────────────────────
function makeMarker(feature) {
  const { Team, Stadium, Logo_url } = feature.properties;
  const [lng, lat] = feature.geometry.coordinates;
  const abbr = TEAM_TO_ABBR[Team] || "";
  const colors = TEAM_COLORS[abbr] || ["#4a2d8a", "#8b7cf6"];
  const primary = colors[0];
  const secondary = colors[1];

  const icon = L.divIcon({
    className: '',
    html: `<div class="pwhl-marker" style="width:50px;height:50px;border-color:${primary};box-shadow:0 3px 12px ${primary}99;">
             <img src="${Logo_url}" alt="${Team}"
               onerror="this.src='https://www.thepwhl.com/favicon.ico'"/>
           </div>`,
    iconSize:   [50, 50],
    iconAnchor: [25, 25],
    popupAnchor:[0, -30]
  });

  const marker = L.marker([lat, lng], { icon });
  marker.bindPopup(() => buildPopup(abbr, Team, Stadium, Logo_url), {
    maxWidth: 450, minWidth: 430
  });
  return marker;
}

// ── POPUP CONTENT ─────────────────────────────────────────────
function buildPopup(abbr, teamName, stadium, logo) {
  const td = pwhlData && pwhlData.teams ? pwhlData.teams[abbr] : null;
  const colors = TEAM_COLORS[abbr] || ["#1a1a2e", "#4a4a8a"];
  const primary = colors[0];
  const secondary = colors[1];

  // Helper: get jersey number — JS lookup first, then JSON field
  const getJersey = (p) => {
    const lookup = JERSEY_NUMBERS[abbr] || {};
    return lookup[p.name] ?? p.jersey ?? null;
  };

  if (!td) {
    return `<div class="team-popup">
      <div class="popup-header" style="background:linear-gradient(135deg,${primary}ee,${primary}99);">
        <img src="${logo}" alt="${teamName}"/>
        <div><div class="team-name">${teamName}</div>
        <div class="team-meta">${stadium}</div></div>
      </div>
      <div class="popup-body"><p style="color:#888;font-size:0.8rem;padding:10px 0;">
        Run the R script to load player data.</p></div>
    </div>`;
  }

  const W   = td.wins   != null ? td.wins   : "–";
  const L   = td.losses != null ? td.losses : "–";
  const OTL = td.otl    != null ? td.otl    : "–";

  const gm   = td.coaches?.gm   || "";
  const head = td.coaches?.head || "TBD";
  const asst = (td.coaches?.assistants || []).join(", ") || "TBD";

  // SEA and VAN were established in 2025
  const estYear = (abbr === "SEA" || abbr === "VAN") ? "2025" : "2024";

  // For dark primary colors (like Ottawa red #c8102e), ensure text is readable
  const textOnPrimary = "#ffffff";

  const allNA   = td.players     || [];
  const allIntl = td.intl_players || [];
  const skaters = allNA.filter(p => !p.is_goalie);
  const goalies = allNA.filter(p => p.is_goalie);

  const playerRow = p => {
    const gp    = p.games_played != null ? p.games_played : "–";
    const stat  = p.is_goalie
      ? (p.save_pct != null ? "." + String(Math.round(p.save_pct * 1000)).padStart(3,"0") : "–")
      : (p.goals    != null ? p.goals : "–");
    const pos   = p.is_goalie ? `<span class="g-badge" style="background:${primary}33;color:${secondary};"">G</span>` : (p.position || "–");
    const num   = getJersey(p);
    return `<tr>
      <td style="color:${secondary};font-weight:700;">${num != null ? num : "–"}</td>
      <td>${p.name || "–"}</td>
      <td>${pos}</td>
      <td>${p.dob || "–"}</td>
      <td>${p.hometown || "–"}</td>
      <td>${gp}</td>
      <td>${stat}</td>
    </tr>`;
  };

  const allRows = [...skaters, ...goalies].map(playerRow).join("") ||
    `<tr><td colspan="7" style="color:#555;text-align:center;padding:8px;">No player data — run R script</td></tr>`;

  let intlSection = "";
  if (allIntl.length > 0) {
    const intlRows = allIntl.map(p => {
      const num = getJersey(p);
      return `<tr>
        <td style="color:${secondary};font-weight:700;">${num != null ? num : "–"}</td>
        <td>${p.name || "–"}</td>
        <td>${p.position || "–"}</td>
        <td>${p.hometown || "–"}</td>
        <td>${p.games_played != null ? p.games_played : "–"}</td>
        <td>${p.is_goalie && p.save_pct != null
              ? "." + String(Math.round(p.save_pct*1000)).padStart(3,"0")
              : (p.goals != null ? p.goals : "–")}</td>
      </tr>`;
    }).join("");
    intlSection = `
      <div class="section-title" style="color:${secondary};">International Players</div>
      <div class="intl-box" style="border-color:${primary}55;">
        <div class="intl-title">Players from outside USA &amp; Canada</div>
        <table class="player-table">
          <thead><tr><th>#</th><th>Name</th><th>Pos</th><th>From</th><th>GP</th><th>G/SV%</th></tr></thead>
          <tbody>${intlRows}</tbody>
        </table>
      </div>`;
  }

  return `<div class="team-popup" style="--team-primary:${primary};--team-secondary:${secondary};">
    <div class="popup-header" style="background:linear-gradient(135deg,${primary},${primary}bb);border-bottom:2px solid ${secondary}44;">
      <img src="${logo}" alt="${teamName}"/>
      <div>
        <div class="team-name" style="color:#ffffff;">${teamName}</div>
        <div class="team-meta" style="color:rgba(255,255,255,0.8);">${stadium} &nbsp;|&nbsp; Est. ${estYear}</div>
      </div>
    </div>
    <div class="popup-body">
      <div class="record-row">
        <div class="stat-pill" style="border-color:${primary}88;">
          <div class="num" style="color:${secondary};">${W}</div><div class="lbl">Wins</div></div>
        <div class="stat-pill" style="border-color:${primary}88;">
          <div class="num" style="color:${secondary};">${L}</div><div class="lbl">Losses</div></div>
        <div class="stat-pill" style="border-color:${primary}88;">
          <div class="num" style="color:${secondary};">${OTL}</div><div class="lbl">OT Losses</div></div>
      </div>
      <div class="section-title" style="color:${secondary};border-color:${primary}44;">Coaching Staff</div>
      <div class="coaches-list">
        ${gm ? `<strong>General Manager:</strong> ${gm}<br/>` : ""}
        <strong>Head Coach:</strong> ${head}<br/>
        <strong>Assistants:</strong> ${asst}
      </div>
      <div class="section-title" style="color:${secondary};border-color:${primary}44;">Roster — 2025–26</div>
      <table class="player-table">
        <thead style="--th-color:${secondary};"><tr>
          <th style="color:${secondary};">#</th>
          <th style="color:${secondary};">Name</th>
          <th style="color:${secondary};">Pos</th>
          <th style="color:${secondary};">DOB</th>
          <th style="color:${secondary};">Hometown</th>
          <th style="color:${secondary};">GP</th>
          <th style="color:${secondary};">G / SV%</th>
        </tr></thead>
        <tbody>${allRows}</tbody>
      </table>
      ${intlSection}
    </div>
  </div>`;
}

// ── LEGEND ────────────────────────────────────────────────────
function addLegend() {
  const ctrl = L.control({ position: 'bottomright' });
  ctrl.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<h4>Players by Origin</h4>';
    COLOR_BREAKS.forEach(b => {
      div.innerHTML += `<div class="legend-row">
        <div class="legend-swatch" style="background:${b.color};border:1px solid rgba(255,255,255,0.18);"></div>
        <span>${b.label}</span>
      </div>`;
    });
    return div;
  };
  ctrl.addTo(map);
}

// ── MAIN ──────────────────────────────────────────────────────
async function init() {
  try {
    // 1. Load PWHL data (from R script)
    let dataOk = false;
    try {
      const res = await fetch(DATA_JSON);
      if (res.ok) { pwhlData = await res.json(); dataOk = true; }
    } catch(e) {}

    if (!dataOk) {
      // Map still loads, just no player data
      console.warn("pwhl_map_data.json not found — run the R script. Map will load without player data.");
      pwhlData = { origins: { us_states: {}, ca_provinces: {} }, teams: {} };
    }

    // Compute global max for colour scale
    const allVals = [
      ...Object.values(pwhlData.origins.us_states   || {}),
      ...Object.values(pwhlData.origins.ca_provinces || {})
    ].filter(Number.isFinite);
    globalMax = allVals.length ? Math.max(...allVals) : 5;

    // 2. Load US + Canada boundary GeoJSON
    const [usRes, caRes, teamRes] = await Promise.all([
      fetch(US_GEOJSON),
      fetch(CA_GEOJSON),
      fetch(TEAMS_GEOJSON)
    ]);

    if (!teamRes.ok) throw new Error(`Cannot load ${TEAMS_GEOJSON} — is it in the same folder?`);
    const [usGeo, caGeo, teamGeo] = await Promise.all([usRes.json(), caRes.json(), teamRes.json()]);

    // 3. Choropleth layers
    makeChoropleth(usGeo, "us").addTo(map);
    makeChoropleth(caGeo, "ca").addTo(map);

    // 4. Team markers — GeoJSON uses Team, Stadium, Logo_url
    (teamGeo.features || []).forEach(f => {
      if (f.geometry?.type === "Point") makeMarker(f).addTo(map);
    });

    // 5. Legend
    addLegend();

    document.getElementById('loading').style.display = 'none';

  } catch(err) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#f55;text-align:center;padding:24px;max-width:420px;">
        <h3 style="margin-bottom:10px;">⚠️ Map Load Error</h3>
        <p style="font-size:0.85rem;">${err.message}</p>
        <p style="font-size:0.75rem;color:#888;margin-top:14px;">
          Make sure all files are in the same folder and you are serving them
          with <code>servr::httd(".")</code> in RStudio (not opening via double-click).
        </p>
      </div>`;
  }
}

init();
</script>
